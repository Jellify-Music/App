appId: com.cosmonautical.jellify
---

# The Search tab may not be showing its root when we arrive: earlier flows can
# leave detail screens (album/artist) pushed on this tab's stack, or leave the
# root list scrolled away from the search input. A pushed screen removes
# search-input from the hierarchy entirely, so scrolling alone can never
# recover it. Recover deterministically instead:

# 1) If the root is just scrolled down, bring the input back into view.
- scrollUntilVisible:
    element:
        id: "search-input"
    direction: UP
    timeout: 20000
    optional: true

# 2) If it's still missing, a detail screen is covering the root — pop it.
#    Re-select the tab after every back-press so this loop can never back out
#    of the app, whichever tab back navigation lands on.
- repeat:
    times: 3
    while:
      notVisible:
        id: "search-input"
    commands:
      - pressKey: BACK
      - waitForAnimationToEnd
      - tapOn:
          id: "search-tab-button"
      - waitForAnimationToEnd

# 3) The restored root may itself still be scrolled — final tidy-up.
- scrollUntilVisible:
    element:
        id: "search-input"
    direction: UP
    timeout: 20000
    optional: true

- assertVisible:
    id: "search-input"

# Tap on the search input to focus it and bring up the keyboard
- tapOn:
    id: "search-input"

# Erase any existing text in the search input
- eraseText

# Search for the Grateful Dead
- inputText: "Grateful Dead"

# Hide the keyboard to reveal search results
- hideKeyboard

# Wait for results to load
- waitForAnimationToEnd

# Take screenshot of search results
- takeScreenshot: screenshots/search/search_results_screen

# Ensure the Grateful Dead artist result is visible and tap on it
- assertVisible:
    id: "artist-search-result-0"
- tapOn:
    id: "artist-search-result-0"

# Take screenshot of artist from search
- takeScreenshot: screenshots/search/artist_from_search_screen

# Run the artist subflow to verify we can navigate to the artist page from search results and that the page loads correctly
- runFlow: ../../subflows/artist/flow.yaml
