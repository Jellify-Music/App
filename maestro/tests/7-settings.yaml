appId: com.cosmonautical.jellify
---
# Navigate to Settings tab
- assertVisible:
    id: 'settings-tab-button'
- tapOn:
    id: 'settings-tab-button'

# Verify we're on the new vertical settings hub
- extendedWaitUntil:
    visible:
      id: 'settings-screen-root'
    timeout: 10000
- assertVisible:
    id: 'settings-profile-card'
- assertVisible:
    text: 'Appearance'
- assertVisible:
    text: 'Gestures'
- assertVisible:
    text: 'Playback'
- assertVisible:
    text: 'Storage'
- assertVisible:
    text: 'Privacy & Developer'
- assertVisible:
    text: 'About'
- takeScreenshot: screenshots/19_settings_hub

# --- Appearance screen ---
- tapOn:
    id: 'settings-nav-appearance'
- extendedWaitUntil:
    visible:
      id: 'settings-screen-appearance'
    timeout: 10000
- assertVisible:
    text: 'Theme'
- assertVisible:
    text: 'Match Device'
- assertVisible:
    text: 'Light'
- assertVisible:
    text: 'Dark'
- assertVisible:
    text: 'OLED Black'
- assertVisible:
    text: 'Color Scheme'
- assertVisible:
    text: 'Purple'
- assertVisible:
    text: 'Ocean'
- assertVisible:
    text: 'Forest'
- assertVisible:
    text: 'Sunset'
- assertVisible:
    text: 'Peanut'
- takeScreenshot: screenshots/20_settings_appearance
# Toggle a non-default theme to confirm the selection works, then restore
- tapOn:
    text: 'Ocean'
- tapOn:
    text: 'Purple'
- tapOn:
    id: 'settings-tab-button'

# --- Gestures screen ---
- assertVisible:
    id: 'settings-screen-root'
- tapOn:
    id: 'settings-nav-gestures'
- extendedWaitUntil:
    visible:
      id: 'settings-screen-gestures'
    timeout: 10000
- assertVisible:
    text: 'Swipe Left'
- assertVisible:
    text: 'Swipe Right'
# All four action chips should be listed (once per direction).
# Use testIDs rather than text because Tamagui renders icons inside the button,
# which makes the iOS accessibility label "<glyph>, <label>" and blocks exact-text matches.
- assertVisible:
    id: 'swipe-left-chip-favorite'
- assertVisible:
    id: 'swipe-left-chip-add-to-playlist'
- assertVisible:
    id: 'swipe-left-chip-add-to-queue'
- assertVisible:
    id: 'swipe-left-chip-play-next'
- assertVisible:
    id: 'swipe-right-chip-favorite'
- assertVisible:
    id: 'swipe-right-chip-add-to-playlist'
- assertVisible:
    id: 'swipe-right-chip-add-to-queue'
- assertVisible:
    id: 'swipe-right-chip-play-next'
# Tap Play Next chip on the left swipe to enable it, then tap again to disable
# (confirms the store wiring works).
- tapOn:
    id: 'swipe-left-chip-play-next'
- tapOn:
    id: 'swipe-left-chip-play-next'
- takeScreenshot: screenshots/21_settings_gestures
- tapOn:
    id: 'settings-tab-button'

# --- Playback screen ---
- assertVisible:
    id: 'settings-screen-root'
- tapOn:
    id: 'settings-nav-playback'
- extendedWaitUntil:
    visible:
      id: 'settings-screen-playback'
    timeout: 10000
- assertVisible:
    text: 'Streaming Quality'
- assertVisible:
    text: 'Original Quality'
- assertVisible:
    text: 'High (320kbps)'
- assertVisible:
    text: 'Medium (192kbps)'
- assertVisible:
    text: 'Low (128kbps)'
- assertVisible:
    text: 'Audio Normalization'
- assertVisible:
    text: 'Quality Badge'
- takeScreenshot: screenshots/22_settings_playback
- tapOn:
    id: 'settings-tab-button'

# --- Storage screen (routes to existing Nitro-backed screen) ---
- assertVisible:
    id: 'settings-screen-root'
- tapOn:
    id: 'settings-nav-storage'
- extendedWaitUntil:
    visible:
      text: 'Storage'
    timeout: 10000
- assertVisible:
    text: 'Download Settings'
- assertVisible:
    text: 'Auto-Download Tracks'
- assertVisible:
    text: 'Download Quality'
- takeScreenshot: screenshots/23_settings_storage
- tapOn:
    id: 'settings-tab-button'

# --- Privacy & Developer screen ---
- assertVisible:
    id: 'settings-screen-root'
- tapOn:
    id: 'settings-nav-privacy-developer'
- extendedWaitUntil:
    visible:
      id: 'settings-screen-privacy-developer'
    timeout: 10000
- assertVisible:
    text: 'Send Analytics'
- assertVisible:
    text: 'Reduce Haptics'
- assertVisible:
    text: 'Developer Options'
- takeScreenshot: screenshots/24_settings_privacy_developer
- tapOn:
    id: 'settings-tab-button'

# --- About screen ---
- assertVisible:
    id: 'settings-screen-root'
- tapOn:
    id: 'settings-nav-about'
- extendedWaitUntil:
    visible:
      id: 'settings-screen-about'
    timeout: 10000
- assertVisible:
    text: 'View Source'
- assertVisible:
    text: 'Caught a bug?'
- assertVisible:
    text: 'Report Issue'
- assertVisible:
    text: 'Join Discord'
- assertVisible:
    text: 'Wall of Fame'
- takeScreenshot: screenshots/25_settings_about
- tapOn:
    id: 'settings-tab-button'

# --- Account screen (via profile card) ---
- assertVisible:
    id: 'settings-screen-root'
- tapOn:
    id: 'settings-profile-card'
- extendedWaitUntil:
    visible:
      id: 'settings-screen-account'
    timeout: 10000
- assertVisible:
    text: 'Music Library'
- assertVisible:
    text: 'Server'
- assertVisible:
    id: 'account-change-library-button'
- takeScreenshot: screenshots/26_settings_account
# Exercise the library selection navigation and go back
- tapOn:
    id: 'account-change-library-button'
- extendedWaitUntil:
    visible:
      id: 'library_selection_screen'
    timeout: 10000
- takeScreenshot: screenshots/27_library_selection
- tapOn:
    id: 'settings-tab-button'

# --- Sign Out (cancel) ---
- assertVisible:
    id: 'settings-screen-root'
- tapOn:
    id: 'settings-signout-button'
- assertVisible:
    text: 'Sign out of Jellify?'
    optional: true
- takeScreenshot: screenshots/28_signout_confirm

# Dismiss the sign-out sheet without signing out (swipe down or tap outside)
- swipe:
    start: 50%, 50%
    end: 50%, 100%
- assertVisible:
    id: 'settings-screen-root'
- takeScreenshot: screenshots/29_settings_after_cancel_signout
