appId:  com.cosmonautical.jellify
---
- launchApp

# Diagnostic: capture what's on screen while waiting for the app to render
- takeScreenshot: screenshots/00_pre_login_debug

# Wait a bit for the app to initialize (TrackPlayer timeout is 10s)
- swipe:
    direction: DOWN
    duration: 100
    optional: true

# Take another screenshot after brief wait to see loading state
- takeScreenshot: screenshots/00_loading_state

# Give CI emulator time to fully initialize the app after launch
- extendedWaitUntil:
    visible:
      id: "server_address_screen"
    timeout: 90000

# Handle permission dialogs if they pop up.
# (Android emulators show these; iOS simulators rarely do.)
- runFlow:
    when:
      visible:
        text: "Allow"
    commands:
      - tapOn:
          text: "Allow"
- runFlow:
    when:
      visible:
        text: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"

# Wait again for the login screen in case dialogs covered it
- extendedWaitUntil:
    visible:
      id: "server_address_screen"
    timeout: 30000

# Take screenshot of server connection screen
- takeScreenshot: screenshots/01_server_connect

# Enter server address. On iOS, pressing Enter submits the form AND dismisses the
# keyboard in one step — no separate connect_button tap needed (hideKeyboard is a
# no-op on iOS simulators and tapping connect_button while the keyboard is up can
# land on a keyboard key instead).
- tapOn:
    id: "server_address_input"
- inputText:  "${server_address}"
- pressKey: Enter
# Fallback tap in case the Enter-submit didn't work (Android or iOS quirks).
- tapOn:
    id: "connect_button"
    optional: true

# Wait for authentication screen
- extendedWaitUntil:
    visible:
      id: "server_authentication_screen"
    timeout: 30000

# Take screenshot of login screen
- takeScreenshot: screenshots/02_login_screen

# Enter username. Same Enter-submit trick as above.
- tapOn:
    id: "username_input"
- inputText: "${username}"
- pressKey: Enter
- tapOn:
    id: "sign_in_button"
    optional: true

# Wait for library selection screen
- extendedWaitUntil:
    visible:
      id: "library_selection_screen"
    timeout: 30000

# Take screenshot of library selection
- takeScreenshot: screenshots/03_library_selection

# Select music library and continue
- tapOn:
    text: "Royalty Free Music"
- tapOn:
    id: "let_s_go_button"

# Wait for home screen by checking for home tab button
- extendedWaitUntil:
    visible:
      id: "home-tab-button"
    timeout: 30000

# Take screenshot of home screen after login
- takeScreenshot: screenshots/04_home_after_login
