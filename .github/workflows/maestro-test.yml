name: Run Vision Camera Harness Tests

# Runs react-native-harness e2e tests for react-native-vision-camera on a
# physical Android device plugged into the self-hosted runner via USB.
#
# The Vision Camera repo's own CI runs these tests on AWS Device Farm
# (.github/workflows/harness-aws-device.yml) - this pipeline replicates that
# flow locally: the app is built on the runner, installed on the connected
# device with adb, and the harness resolves the device by manufacturer/model
# (same as the AWS test spec).

on:
  pull_request:
  workflow_dispatch:
    inputs:
      vision_camera_repository:
        description: 'Vision Camera repository to test (owner/repo)'
        required: false
        default: 'mrousavy/react-native-vision-camera'
        type: string
      vision_camera_ref:
        description: 'Vision Camera branch, tag, or SHA to test'
        required: false
        default: 'main'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  VISION_CAMERA_REPOSITORY: ${{ inputs.vision_camera_repository || 'mrousavy/react-native-vision-camera' }}
  VISION_CAMERA_REF: ${{ inputs.vision_camera_ref || 'main' }}

jobs:
  harness-tests:
    if: github.repository == 'Jellify-Music/App'
    runs-on: self-hosted
    timeout-minutes: 60

    env:
      HARNESS_PROJECT_ROOT: apps/simple-camera
      HARNESS_ANDROID_APP_BUILD_OUTPUT: apps/simple-camera/android/app/build/outputs/apk/debug/app-debug.apk
      HARNESS_ANDROID_BUNDLE_ID: com.margelo.nitro.camera.example.simple
      # Run the harness against a physical device (not an emulator)
      HARNESS_ANDROID_DEVICE_MODE: physical
      # Physical Android devices are arm64
      HARNESS_ANDROID_DEVICE_ARCH: arm64-v8a
      HARNESS_ANDROID_STARTUP_TIMEOUT_SECONDS: 60
      HARNESS_ARTIFACTS_DIR: harness-artifacts

    steps:
      - name: 🛒 Checkout Vision Camera
        uses: actions/checkout@v6
        with:
          repository: ${{ env.VISION_CAMERA_REPOSITORY }}
          ref: ${{ env.VISION_CAMERA_REF }}

      - name: 🤖 Resolve Android SDK
        shell: bash
        run: |
          ANDROID_SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-$HOME/Library/Android/sdk}}"
          if [[ ! -x "$ANDROID_SDK/platform-tools/adb" ]]; then
            echo "::error::adb not found at $ANDROID_SDK/platform-tools/adb. Is the Android SDK installed on this runner?"
            exit 1
          fi
          echo "ANDROID_HOME=$ANDROID_SDK" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK/platform-tools" >> "$GITHUB_PATH"

      - name: 📱 Verify Physical Device
        shell: bash
        run: |
          adb start-server
          echo "Connected devices:"
          adb devices -l

          SERIAL="$(adb devices | awk '$2 == "device" && $1 !~ /^emulator-/ {print $1; exit}')"
          if [[ -z "$SERIAL" ]]; then
            echo "::error::No physical Android device connected to this runner (or the device is offline/unauthorized)."
            exit 1
          fi

          MANUFACTURER="$(adb -s "$SERIAL" shell getprop ro.product.manufacturer | tr -d '\r')"
          MODEL="$(adb -s "$SERIAL" shell getprop ro.product.model | tr -d '\r')"
          echo "Using physical device: ${MANUFACTURER} ${MODEL} (${SERIAL})"

          # Target this device in all later adb calls, and let the harness
          # resolve it by manufacturer/model - same as the AWS test spec.
          echo "ANDROID_SERIAL=$SERIAL" >> "$GITHUB_ENV"
          echo "HARNESS_ANDROID_DEVICE_MANUFACTURER=$MANUFACTURER" >> "$GITHUB_ENV"
          echo "HARNESS_ANDROID_DEVICE_MODEL=$MODEL" >> "$GITHUB_ENV"

          # Keep the device awake and unlocked for the test run
          adb -s "$SERIAL" shell input keyevent KEYCODE_WAKEUP || true
          adb -s "$SERIAL" shell wm dismiss-keyguard || true
          adb -s "$SERIAL" shell svc power stayon usb || true

      - name: 🖥 Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: 🟩 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📥 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🚀 Build Android Debug APK
        working-directory: apps/simple-camera/android
        run: ./gradlew assembleDebug -Pandroid.injected.testOnly=false -PreactNativeArchitectures=${{ env.HARNESS_ANDROID_DEVICE_ARCH }} --build-cache --console=plain

      - name: 📲 Install APK on Device
        shell: bash
        run: |
          set -euo pipefail

          APK_PATH="${{ env.HARNESS_ANDROID_APP_BUILD_OUTPUT }}"
          BUNDLE_ID="${{ env.HARNESS_ANDROID_BUNDLE_ID }}"

          test -f "$APK_PATH"

          echo "Installing $APK_PATH on $ANDROID_SERIAL..."
          if ! adb install -r -t "$APK_PATH"; then
            echo "Reinstall failed - uninstalling and trying again..."
            adb uninstall "$BUNDLE_ID" || true
            adb install -t "$APK_PATH"
          fi

      - name: 🔎 Check App Startup
        shell: bash
        run: |
          set -euo pipefail

          BUNDLE_ID="${{ env.HARNESS_ANDROID_BUNDLE_ID }}"
          APP_ACTIVITY="${BUNDLE_ID}/.MainActivity"
          STARTUP_TIMEOUT_SECONDS="${{ env.HARNESS_ANDROID_STARTUP_TIMEOUT_SECONDS }}"

          adb logcat -c || true
          adb shell am force-stop "$BUNDLE_ID" || true
          adb shell am start -W -n "$APP_ACTIVITY"

          launch_deadline=$((SECONDS + STARTUP_TIMEOUT_SECONDS))
          while true; do
            if adb shell pidof "$BUNDLE_ID" | tr -d '\r' | grep -Eq '[0-9]+'; then
              break
            fi

            if (( SECONDS >= launch_deadline )); then
              echo "::error::App $BUNDLE_ID did not start within ${STARTUP_TIMEOUT_SECONDS}s."
              adb logcat -d -b crash || true
              exit 1
            fi

            sleep 2
          done

          # Ensure the process does not die immediately after launch.
          sleep 5
          if ! adb shell pidof "$BUNDLE_ID" | tr -d '\r' | grep -Eq '[0-9]+'; then
            echo "::error::App $BUNDLE_ID crashed shortly after launch."
            adb logcat -d -b crash || true
            exit 1
          fi

          adb shell am force-stop "$BUNDLE_ID" || true

      - name: 🧪 Run Harness Tests on Physical Device
        shell: bash
        working-directory: ${{ env.HARNESS_PROJECT_ROOT }}
        env:
          CI: 'true'
          FORCE_COLOR: '1'
        run: |
          set -euo pipefail

          ARTIFACTS_DIR="$GITHUB_WORKSPACE/${{ env.HARNESS_ARTIFACTS_DIR }}"
          mkdir -p "$ARTIFACTS_DIR"

          # Capture device logs for the duration of the test run
          adb logcat -c || true
          adb logcat > "$ARTIFACTS_DIR/logcat.txt" 2>&1 &
          LOGCAT_PID=$!
          trap 'kill "$LOGCAT_PID" 2>/dev/null || true' EXIT

          set +e
          JEST_JUNIT_OUTPUT_FILE="$ARTIFACTS_DIR/harness-results.junit.xml" \
            bun run test:harness:android -- \
              --reporters=default \
              --reporters=jest-junit \
              --verbose 2>&1 | tee "$ARTIFACTS_DIR/harness-output.log"
          exit_code=${PIPESTATUS[0]}
          set -e

          exit "$exit_code"

      - name: 📤 Upload Test Artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: vision-camera-harness-results
          path: ${{ env.HARNESS_ARTIFACTS_DIR }}/
          retention-days: 14

      - name: 🧹 Cleanup Device
        if: always()
        shell: bash
        run: |
          adb shell am force-stop "${{ env.HARNESS_ANDROID_BUNDLE_ID }}" 2>/dev/null || true
          adb shell svc power stayon false 2>/dev/null || true
