name: Run Maestro Tests

on:
  workflow_dispatch:
    inputs:
      flow:
        description: 'Test flow to run (smoke or full)'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - full
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  maestro-tests:
    if: github.repository == 'Jellify-Music/App'
    runs-on: self-hosted
    timeout-minutes: 45

    env:
      # Scheduled runs use full regression; manual dispatch respects input (default: smoke)
      MAESTRO_FLOW: ${{ github.event_name == 'schedule' && 'full' || inputs.flow || 'smoke' }}

    steps:
      - name: 🛒 Checkout
        uses: actions/checkout@v6

      - name: 🧭 Resolve Emulator ABI
        id: resolve-abi
        shell: bash
        run: |
          if [[ "$RUNNER_ARCH" == "ARM64" ]]; then
            echo "emulator_arch=arm64-v8a" >> "$GITHUB_OUTPUT"
            echo "apk_filename=app-arm64-v8a-debug.apk" >> "$GITHUB_OUTPUT"
          else
            echo "emulator_arch=x86_64" >> "$GITHUB_OUTPUT"
            echo "apk_filename=app-x86_64-debug.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: 📦 Check APK Cache
        id: apk-cache
        uses: actions/cache@v5
        with:
          path: ./android/app/build/outputs/apk/debug/${{ steps.resolve-abi.outputs.apk_filename }}
          key: android-debug-apk-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('android/**', 'package.json', 'bun.lock', 'patches/**', '.env', 'scripts/updateEnv.js') }}

      - name: 🖥 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: 🟩 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 📦 Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.cache/turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: 📥 Install dependencies
        run: |
          bun i

      - name: ☕ Setup JDK 17
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐘 Setup Gradle with caching
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: 📦 Cache Gradle
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 💬 Disable OTA Updates and Enable Maestro Build
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: bun scripts/updateEnv.js OTA_UPDATE_ENABLED=false IS_MAESTRO_BUILD=true

      - name: 🚀 Build Android Debug APK
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: cd android && ./gradlew assembleDebug -PreactNativeArchitectures=${{ steps.resolve-abi.outputs.emulator_arch }}

      - name: 🎭 Install Maestro
        shell: bash
        run: |
          export MAESTRO_VERSION=2.0.3
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: 📦 Cache AVD
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-34-${{ steps.resolve-abi.outputs.emulator_arch }}-${{ runner.os }}

      - name: 🔧 Enable KVM (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: 🧪 Run Maestro Tests
        id: run-tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: ${{ steps.resolve-abi.outputs.emulator_arch }}
          profile: pixel_6
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6G
          cores: 4
          disable-animations: true
          disable-spellchecker: true
          disable-linux-hw-accel: ${{ runner.os != 'Linux' }}
          emulator-boot-timeout: 600
          avd-name: maestro_emulator_${{ steps.resolve-abi.outputs.emulator_arch }}
          force-avd-creation: false
          emulator-options: ${{ runner.os == 'macOS' && '-no-window -gpu host -noaudio -no-boot-anim' || '-no-window -gpu swiftshader_indirect -noaudio -no-boot-anim' }}
          script: |
            echo "📋 Runner: os=${{ runner.os }}, arch=${{ runner.arch }}"
            echo "📋 Emulator arch: ${{ steps.resolve-abi.outputs.emulator_arch }}"
            echo "📋 APK expected: ./android/app/build/outputs/apk/debug/${{ steps.resolve-abi.outputs.apk_filename }}"
            ls -lah ./android/app/build/outputs/apk/debug || true
            echo "📋 ADB devices before install:"
            adb devices -l || true
            echo "📱 Installing debug APK..."
            adb install ./android/app/build/outputs/apk/debug/${{ steps.resolve-abi.outputs.apk_filename }}
            echo "🚀 Starting logcat capture..."
            adb logcat -c
            adb logcat '*:W' ReactNative:V ReactNativeJS:V TrackPlayer:V > logcat.txt 2>&1 &
            LOGCAT_PID=$!
            echo "🚀 Launching app..."
            APP_ID=com.cosmonautical.jellify
            MAIN_ACTIVITY=$(adb shell cmd package resolve-activity --brief "$APP_ID" 2>/dev/null | tail -n 1 | tr -d '\r')
            if [[ "$MAIN_ACTIVITY" == */* ]]; then
              echo "📋 Launching resolved activity: $MAIN_ACTIVITY"
              adb shell am start -W -n "$MAIN_ACTIVITY" || echo "⚠️ Activity launch failed, continuing to let Maestro attempt launch."
            else
              echo "⚠️ Could not resolve launcher activity, falling back to monkey"
              adb shell monkey -p "$APP_ID" -c android.intent.category.LAUNCHER 1 || echo "⚠️ Monkey launch failed, continuing to let Maestro attempt launch."
            fi
            sleep 5
            echo "🎭 Running Maestro smoke test..."
            MAESTRO_EXIT=0
            ~/.maestro/bin/maestro test --debug-output debug-output ${{ env.MAESTRO_FLOW == 'full' && './maestro/flows/flow-0.yaml' || './maestro/flows/flow-smoke.yaml' }} --env server_address=https://jellyfin.jellify.app --env username=jerry || MAESTRO_EXIT=$?
            echo "📋 Stopping logcat..."
            kill $LOGCAT_PID 2>/dev/null || true
            echo "📋 Last 200 lines of logcat:"
            tail -200 logcat.txt
            echo "📋 React Native specific logs:"
            grep -i 'ReactNative\|ReactNativeJS\|TrackPlayer\|FATAL\|CRASH\|Error' logcat.txt | tail -100 || true
            echo "📋 Dumping UI hierarchy..."
            adb shell uiautomator dump /sdcard/ui_hierarchy.xml 2>/dev/null || true
            adb pull /sdcard/ui_hierarchy.xml ui_hierarchy.xml 2>/dev/null || true
            cat ui_hierarchy.xml 2>/dev/null || true
            exit $MAESTRO_EXIT

      - name: 📸 Collect Screenshots and Logs
        if: always()
        run: |
          mkdir -p test-artifacts
          cp -r screenshots/* test-artifacts/ 2>/dev/null || true
          cp -r .maestro/screenshots/* test-artifacts/ 2>/dev/null || true
          cp *.mp4 test-artifacts/ 2>/dev/null || true
          cp logcat.txt test-artifacts/ 2>/dev/null || true
          cp ui_hierarchy.xml test-artifacts/ 2>/dev/null || true
          cp -r debug-output/* test-artifacts/ 2>/dev/null || true

      - name: 🗣️ Notify Success on Discord
        if: success() && github.repository == 'Jellify-Music/App'
        run: |
          bun scripts/sendDiscordMessage.js "__**## ✅ Maestro Test Passed (${{ env.MAESTRO_FLOW }})**__All checks completed successfully!"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.MAESTRO_WEBHOOK_RESULTS }}

      - name: 🗣️ Notify Failure on Discord
        if: failure() && github.repository == 'Jellify-Music/App'
        run: |
          bun scripts/sendDiscordMessage.js "__**## ❌ Maestro Test Failed (${{ env.MAESTRO_FLOW }})**__Some tests did not pass. Check artifacts for details."
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.MAESTRO_WEBHOOK_RESULTS }}

      - name: 📤 Upload Test Artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: maestro-test-results
          path: |
            test-artifacts/
          retention-days: 14
